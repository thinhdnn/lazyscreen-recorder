<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Area Selection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: crosshair;
      background: transparent;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
    }

    .selection-box {
      position: fixed;
      border: 2px solid #3B82F6;
      background: rgba(59, 130, 246, 0.06);
      display: none;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.35);
    }

    .selection-box::after {
      content: attr(data-size);
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #F1F5F9;
      background: rgba(15, 23, 42, 0.85);
      padding: 3px 10px;
      border-radius: 6px;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #F1F5F9;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      padding: 14px 28px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.2s ease-out;
    }

    .hint kbd {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-family: inherit;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="selection-box" id="selection"></div>
  <div class="hint" id="hint">Drag to select area &middot; <kbd>Esc</kbd> to cancel</div>
  <script src="area-overlay.js"></script>
</body>
</html>
